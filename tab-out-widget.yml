- type: html
  source: |
    <div class="tabout-widget" data-tabout-widget>
      <style>
        .tabout-widget {
          display: flex;
          flex-direction: column;
          gap: 12px;
          padding-top: 2px;
          container-type: inline-size;
        }

        .tabout-toolbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
          flex-wrap: wrap;
        }

        .tabout-stats {
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
          color: var(--color-text-subdue);
          font-size: var(--font-size-h6);
          line-height: 1;
        }

        .tabout-stats > span {
          border: 1px solid var(--color-separator);
          border-radius: 999px;
          padding: 5px 8px;
          background: var(--color-widget-background-highlight);
        }

        .tabout-refresh {
          border: 1px solid var(--color-separator);
          background: var(--color-widget-background-highlight);
          color: var(--color-text-base);
          border-radius: var(--border-radius);
          padding: 5px 10px;
          cursor: pointer;
          transition: border-color 0.15s ease, color 0.15s ease, transform 0.15s ease;
        }

        .tabout-refresh:hover {
          border-color: var(--color-primary);
          color: var(--color-text-highlight);
          transform: translateY(-1px);
        }

        .tabout-message {
          color: var(--color-text-subdue);
          font-size: var(--font-size-h6);
          line-height: 1.4;
        }

        .tabout-message.error {
          color: var(--color-negative);
        }

        .tabout-groups {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(min(100%, 42rem), 1fr));
          gap: 12px;
          align-items: start;
        }

        .tabout-group {
          border: 1px solid var(--color-separator);
          border-radius: var(--border-radius);
          background: linear-gradient(180deg, var(--color-widget-background-highlight), var(--color-widget-background));
          overflow: hidden;
          box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
          transition: border-color 0.15s ease, background 0.15s ease;
        }

        .tabout-group[open] {
          border-color: var(--color-primary);
        }

        .tabout-group-title {
          display: flex;
          flex-direction: column;
          gap: 10px;
          position: relative;
          color: var(--color-text-base);
          cursor: pointer;
          list-style: none;
          padding: 12px 12px 12px 32px;
        }

        .tabout-group-title::-webkit-details-marker {
          display: none;
        }

        .tabout-group-title::before {
          content: '>';
          position: absolute;
          top: 15px;
          left: 13px;
          color: var(--color-text-subdue);
          font-size: var(--font-size-h6);
          line-height: 1;
          transition: transform 0.15s ease;
        }

        .tabout-group[open] .tabout-group-title::before {
          transform: rotate(90deg);
        }

        .tabout-group-header {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          align-items: start;
          gap: 10px;
          width: 100%;
        }

        .tabout-domain-main {
          min-width: 0;
        }

        .tabout-domain-name {
          display: block;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          color: var(--color-text-highlight);
          font-size: var(--font-size-h5);
          font-weight: 700;
          line-height: 1.3;
        }

        .tabout-domain-meta {
          display: block;
          margin-top: 2px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          color: var(--color-text-subdue);
          font-size: var(--font-size-h6);
          line-height: 1.3;
        }

        .tabout-count {
          min-width: 28px;
          border: 1px solid var(--color-separator);
          border-radius: 999px;
          padding: 4px 7px;
          text-align: center;
          color: var(--color-text-highlight);
          background: var(--color-widget-background);
          font-size: var(--font-size-h6);
          font-weight: 700;
          line-height: 1;
        }

        .tabout-group-preview {
          display: grid;
          gap: 6px;
        }

        .tabout-group[open] .tabout-group-preview {
          display: none;
        }

        .tabout-preview-row {
          display: grid;
          grid-template-columns: 7px minmax(0, 1fr);
          align-items: center;
          gap: 7px;
          min-width: 0;
          color: var(--color-text-base);
          font-size: var(--font-size-h6);
          line-height: 1.3;
        }

        .tabout-preview-row::before {
          content: '';
          width: 7px;
          height: 7px;
          border-radius: 999px;
          background: var(--color-primary);
          opacity: 0.75;
        }

        .tabout-preview-row > span {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .tabout-preview-more {
          color: var(--color-text-subdue);
        }

        .tabout-tabs {
          display: flex;
          flex-direction: column;
          gap: 6px;
          padding: 0 12px 12px 32px;
        }

        .tabout-tab {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 8px;
          align-items: center;
          border: 1px solid var(--color-separator);
          border-radius: var(--border-radius);
          padding: 8px 9px;
          background: var(--color-widget-background);
        }

        .tabout-tab-main {
          min-width: 0;
          overflow: hidden;
        }

        .tabout-tab-title {
          display: block;
          width: 100%;
          max-width: 100%;
          min-width: 0;
          text-align: left;
          background: transparent;
          border: 0;
          padding: 0;
          color: var(--color-text-highlight);
          font-size: var(--font-size-h5);
          line-height: 1.35;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          cursor: pointer;
        }

        .tabout-tab-meta {
          display: flex;
          flex-wrap: wrap;
          gap: 5px;
          margin-top: 4px;
          color: var(--color-text-subdue);
          font-size: var(--font-size-h6);
          line-height: 1;
        }

        .tabout-tab-meta > span {
          border: 1px solid var(--color-separator);
          border-radius: 999px;
          padding: 3px 6px;
          background: var(--color-widget-background-highlight);
        }

        .tabout-actions {
          display: flex;
          gap: 4px;
        }

        .tabout-action {
          border: 1px solid var(--color-separator);
          background: var(--color-widget-background-highlight);
          color: var(--color-text-subdue);
          border-radius: var(--border-radius);
          width: 26px;
          height: 26px;
          cursor: pointer;
          transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
        }

        .tabout-action:hover {
          color: var(--color-text-highlight);
          border-color: var(--color-primary);
        }

        @container (max-width: 42rem) {
          .tabout-stats {
            flex: 1 1 100%;
          }

          .tabout-refresh {
            margin-left: auto;
          }

          .tabout-group-title {
            padding-left: 26px;
          }

          .tabout-group-title::before {
            left: 10px;
          }

          .tabout-tabs {
            padding-left: 26px;
          }

          .tabout-tab {
            grid-template-columns: 1fr;
          }

          .tabout-actions {
            justify-content: flex-end;
          }
        }

        @media (max-width: 600px) {
          .tabout-stats {
            flex: 1 1 100%;
          }

          .tabout-refresh {
            margin-left: auto;
          }

          .tabout-group-title {
            padding-left: 26px;
          }

          .tabout-group-title::before {
            left: 10px;
          }

          .tabout-tabs {
            padding-left: 26px;
          }

          .tabout-tab {
            grid-template-columns: 1fr;
          }

          .tabout-actions {
            justify-content: flex-end;
          }
        }
      </style>

      <div class="tabout-toolbar">
        <div class="tabout-stats" data-role="stats">Connecting to Tab Out...</div>
        <button class="tabout-refresh" type="button" data-action="refresh">Refresh</button>
      </div>
      <div class="tabout-message" data-role="message"></div>
      <div class="tabout-groups" data-role="groups"></div>
    </div>

    <script>
      (() => {
        const scriptEl = document.currentScript;
        const root = scriptEl?.previousElementSibling?.matches?.('[data-tabout-widget]')
          ? scriptEl.previousElementSibling
          : scriptEl?.closest?.('[data-tabout-widget]') || document.querySelector('[data-tabout-widget]');

        if (!root) {
          console.error('[tabout-widget] Failed to find widget root element');
          return;
        }

        const statsEl = root.querySelector('[data-role="stats"]');
        const messageEl = root.querySelector('[data-role="message"]');
        const groupsEl = root.querySelector('[data-role="groups"]');
        const pending = new Map();

        function request(action, payload = {}) {
          const requestId = `tabout-${Date.now()}-${Math.random().toString(16).slice(2)}`;

          return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => {
              pending.delete(requestId);
              reject(new Error('Tab Out bridge extension did not respond'));
            }, 2500);

            pending.set(requestId, { resolve, reject, timeout });
            window.postMessage({
              source: 'glance-tab-out-widget',
              requestId,
              action,
              ...payload,
            }, window.location.origin);
          });
        }

        window.addEventListener('message', (event) => {
          if (event.source !== window) return;
          if (!event.data || event.data.source !== 'glance-tab-out-bridge') return;

          const entry = pending.get(event.data.requestId);
          if (!entry) return;

          pending.delete(event.data.requestId);
          clearTimeout(entry.timeout);

          if (event.data.ok) {
            entry.resolve(event.data.data);
          } else {
            entry.reject(new Error(event.data.error || 'Tab Out bridge failed'));
          }
        });

        function escapeHtml(value) {
          return String(value || '').replace(/[&<>"']/g, (char) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
          }[char]));
        }

        function getExpandedDomains() {
          const expandedDomains = new Set();
          const expandedGroups = groupsEl.querySelectorAll('.tabout-group[open][data-domain]');

          for (const group of expandedGroups) {
            expandedDomains.add(group.dataset.domain);
          }

          return expandedDomains;
        }

        function getRenderedDomainOrder() {
          const domainOrder = new Map();
          const renderedGroups = groupsEl.querySelectorAll('.tabout-group[data-domain]');

          for (const group of renderedGroups) {
            if (!domainOrder.has(group.dataset.domain)) {
              domainOrder.set(group.dataset.domain, domainOrder.size);
            }
          }

          return domainOrder;
        }

        function compareGroups(a, b) {
          return b[1].length - a[1].length || a[0].localeCompare(b[0]);
        }

        function renderStats(stats, groupCount) {
          const duplicateLabel = stats.duplicateUrls === 1 ? 'duplicate' : 'duplicates';

          statsEl.innerHTML = `
            <span>${stats.webTabs} tabs</span>
            <span>${groupCount} groups</span>
            <span>${stats.duplicateUrls} ${duplicateLabel}</span>
          `;
        }

        function renderPreviewRows(groupTabs) {
          const previewTabs = groupTabs.slice(0, 3);
          const remaining = groupTabs.length - previewTabs.length;
          const rows = previewTabs.map((tab) => `
            <span class="tabout-preview-row"><span>${escapeHtml(tab.title)}</span></span>
          `);

          if (remaining > 0) {
            rows.push(`<span class="tabout-preview-row tabout-preview-more"><span>+${remaining} more</span></span>`);
          }

          return rows.join('');
        }

        function render(data) {
          const expandedDomains = getExpandedDomains();
          const renderedDomainOrder = getRenderedDomainOrder();
          const tabs = data.tabs.filter((tab) => !tab.isInternal);
          const groups = new Map();

          for (const tab of tabs) {
            if (!groups.has(tab.domain)) groups.set(tab.domain, []);
            groups.get(tab.domain).push(tab);
          }

          const sortedGroups = [...groups.entries()]
            .sort((a, b) => {
              const aOrder = renderedDomainOrder.get(a[0]);
              const bOrder = renderedDomainOrder.get(b[0]);

              if (aOrder !== undefined && bOrder !== undefined) return aOrder - bOrder;
              if (aOrder !== undefined) return -1;
              if (bOrder !== undefined) return 1;

              return compareGroups(a, b);
            });

          renderStats(data.stats, sortedGroups.length);
          messageEl.textContent = '';
          messageEl.classList.remove('error');

          groupsEl.innerHTML = sortedGroups.map(([domain, groupTabs]) => `
            <details class="tabout-group" data-domain="${escapeHtml(domain)}"${expandedDomains.has(domain) ? ' open' : ''}>
              <summary class="tabout-group-title">
                <span class="tabout-group-header">
                  <span class="tabout-domain-main">
                    <span class="tabout-domain-name">${escapeHtml(domain)}</span>
                    <span class="tabout-domain-meta">${groupTabs.length} ${groupTabs.length === 1 ? 'tab' : 'tabs'}</span>
                  </span>
                  <span class="tabout-count">${groupTabs.length}</span>
                </span>
                <span class="tabout-group-preview">${renderPreviewRows(groupTabs)}</span>
              </summary>
              <div class="tabout-tabs">
                ${groupTabs.map((tab) => {
                  const duplicate = tab.duplicateCount > 1 ? `${tab.duplicateCount}x` : '';
                  const state = tab.discarded ? 'discarded' : tab.active ? 'active' : '';

                  return `
                    <div class="tabout-tab" data-tab-id="${tab.id}" data-window-id="${tab.windowId}">
                      <div class="tabout-tab-main">
                        <button class="tabout-tab-title text-truncate" type="button" data-action="focus" title="${escapeHtml(tab.url)}">${escapeHtml(tab.title)}</button>
                        <div class="tabout-tab-meta">
                          ${duplicate ? `<span class="color-negative">${duplicate}</span>` : ''}
                          ${state ? `<span>${state}</span>` : ''}
                          ${tab.pinned ? '<span>pinned</span>' : ''}
                          ${tab.audible ? '<span>audio</span>' : ''}
                        </div>
                      </div>
                      <div class="tabout-actions">
                        <button class="tabout-action" type="button" data-action="discard" title="Discard tab">D</button>
                        <button class="tabout-action" type="button" data-action="close" title="Close tab">x</button>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </details>
          `).join('');
        }

        async function refresh() {
          try {
            messageEl.textContent = '';
            messageEl.classList.remove('error');
            const data = await request('getTabs');
            render(data);
          } catch (error) {
            statsEl.textContent = 'Tab Out bridge unavailable';
            groupsEl.innerHTML = '';
            messageEl.textContent = error.message;
            messageEl.classList.add('error');
          }
        }

        root.addEventListener('click', async (event) => {
          const button = event.target.closest('[data-action]');
          if (!button) return;
          event.preventDefault();
          event.stopPropagation();

          const action = button.dataset.action;
          const tabEl = button.closest('[data-tab-id]');

          try {
            if (action === 'refresh') {
              await refresh();
              return;
            }

            if (!tabEl) return;

            const tabId = Number(tabEl.dataset.tabId);
            const windowId = Number(tabEl.dataset.windowId);

            if (action === 'focus') {
              await request('focusTab', { tabId, windowId });
            } else if (action === 'close') {
              await request('closeTabs', { tabIds: [tabId] });
              await refresh();
            } else if (action === 'discard') {
              await request('discardTabs', { tabIds: [tabId] });
              await refresh();
            }
          } catch (error) {
            messageEl.textContent = error.message;
            messageEl.classList.add('error');
          }
        });

        refresh().catch((error) => {
          statsEl.textContent = 'Tab Out widget failed to initialize';
          messageEl.textContent = error && error.message ? error.message : String(error);
          messageEl.classList.add('error');
          console.error('[tabout-widget] Initialization error', error);
        });
      })();
    </script>
